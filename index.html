<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorched Earth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
  #container { display: flex; flex-direction: column; height: 100vh; }
  #hud { background: #111; border-bottom: 2px solid #0f0; padding: 4px 10px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; font-size: 13px; min-height: 44px; }
  #hud .player-info { display: flex; gap: 8px; align-items: center; }
  #hud .hud-label { color: #888; }
  #hud .hud-val { color: #ff0; font-weight: bold; }
  #hud .current-player { color: #0ff; font-size: 15px; font-weight: bold; }
  #canvas-wrap { flex: 1; position: relative; }
  canvas { display: block; width: 100%; height: 100%; }
  #controls { background: #111; border-top: 2px solid #0f0; padding: 6px 10px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; font-size: 13px; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; }
  .ctrl-group label { color: #888; }
  .ctrl-group .val { color: #ff0; min-width: 36px; display: inline-block; text-align: right; }
  input[type=range] { -webkit-appearance: none; width: 120px; height: 6px; background: #333; border-radius: 3px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #0f0; cursor: pointer; }
  button { background: #0f0; color: #000; border: none; padding: 5px 14px; font-family: inherit; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 2px; }
  button:hover { background: #0a0; }
  button:disabled { background: #555; color: #888; cursor: default; }
  select { background: #222; color: #0f0; border: 1px solid #0f0; padding: 3px 6px; font-family: inherit; font-size: 13px; }
  #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); border: 2px solid #0f0; padding: 20px 36px; text-align: center; font-size: 18px; z-index: 10; display: none; }
  #message h2 { color: #ff0; margin-bottom: 10px; }
  #message p { color: #0f0; margin-bottom: 14px; font-size: 14px; }
  #message button { font-size: 15px; padding: 8px 24px; }
  #wind-arrow { font-size: 20px; }
  .tank-hp { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin: 0 1px; }
</style>
</head>
<body>
<div id="container">
  <div id="hud">
    <span id="turn-label" class="current-player">PLAYER 1</span>
    <span class="player-info"><span class="hud-label">HP:</span><span class="hud-val" id="hp-val">100</span></span>
    <span class="player-info"><span class="hud-label">CASH:$</span><span class="hud-val" id="cash-val">0</span></span>
    <span class="player-info"><span class="hud-label">ROUND:</span><span class="hud-val" id="round-val">1</span></span>
    <span style="flex:1"></span>
    <span class="player-info"><span id="wind-arrow">→</span>&nbsp;<span class="hud-label">WIND:</span><span class="hud-val" id="wind-val">0</span></span>
    <span class="player-info" id="scores-hud"></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="message">
      <h2 id="msg-title">GAME OVER</h2>
      <p id="msg-body"></p>
      <button id="msg-btn" onclick="startNewGame()">NEW GAME</button>
    </div>
  </div>
  <div id="controls">
    <div class="ctrl-group">
      <label>ANGLE</label>
      <input type="range" id="angle-slider" min="0" max="180" value="45">
      <span class="val" id="angle-val">45°</span>
    </div>
    <div class="ctrl-group">
      <label>POWER</label>
      <input type="range" id="power-slider" min="5" max="100" value="50">
      <span class="val" id="power-val">50</span>
    </div>
    <div class="ctrl-group">
      <label>WEAPON</label>
      <select id="weapon-select"></select>
    </div>
    <button id="fire-btn" onclick="fire()">FIRE!</button>
    <span style="font-size:11px;color:#555">← → adjust angle &nbsp;|&nbsp; [ ] power &nbsp;|&nbsp; SPACE fire</span>
  </div>
</div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const NUM_PLAYERS = 4;
const TANK_W = 16, TANK_H = 10;
const BARREL_LEN = 12;
const GRAVITY = 120; // px/s²
const FPS = 60;
const TERRAIN_ROUGHNESS = 8;

// ─── Weapon definitions ───────────────────────────────────────────────────────
const WEAPONS = [
  { name:'Baby Missile',  cost:0,   radius:18, damage:25,  projectiles:1, spread:0,   color:'#ff0',  trail:'#fa0' },
  { name:'Missile',       cost:0,   radius:28, damage:40,  projectiles:1, spread:0,   color:'#f80',  trail:'#f40' },
  { name:'MIRV',          cost:150, radius:22, damage:30,  projectiles:5, spread:0.3, color:'#f0f',  trail:'#a0a' },
  { name:'Napalm',        cost:200, radius:45, damage:55,  projectiles:1, spread:0,   color:'#f40',  trail:'#f80', napalm:true },
  { name:'Nuke',          cost:500, radius:90, damage:100, projectiles:1, spread:0,   color:'#fff',  trail:'#ff0' },
  { name:'Dirt Ball',     cost:50,  radius:30, damage:0,   projectiles:1, spread:0,   color:'#840',  trail:'#640', dirt:true },
  { name:'Roller',        cost:100, radius:20, damage:35,  projectiles:1, spread:0,   color:'#0ff',  trail:'#08f', roller:true },
];

// ─── Colors per player ────────────────────────────────────────────────────────
const PLAYER_COLORS = ['#0f0','#f00','#ff0','#f0f'];
const PLAYER_NAMES  = ['Player 1','Player 2','Player 3','Player 4'];

// ─── State ────────────────────────────────────────────────────────────────────
let canvas, ctx, W, H;
let terrain = []; // height array, one per x pixel
let players = [];
let currentPlayer = 0;
let wind = 0; // pixels/s horizontal
let projectiles = [];
let explosions = [];
let gameRunning = false;
let animating = false;
let round = 1;
let roundsTotal = 5;

// ─── Player structure ─────────────────────────────────────────────────────────
function makePlayer(i) {
  return {
    id: i,
    name: PLAYER_NAMES[i],
    color: PLAYER_COLORS[i],
    x: 0, y: 0,
    hp: 100,
    cash: 500,
    angle: i < 2 ? 45 : 135,
    power: 50,
    weapon: 0,
    alive: true,
    score: 0,
    inventory: [99,10,3,2,1,3,2], // ammo per weapon
  };
}

// ─── Terrain generation ────────────────────────────────────────────────────────
function generateTerrain() {
  terrain = new Array(W).fill(0);
  // midpoint displacement
  const arr = new Float32Array(W);
  arr[0] = H * 0.5;
  arr[W-1] = H * 0.5;
  let step = W;
  let scale = H * 0.4;
  while (step > 1) {
    const half = step >> 1;
    for (let x = half; x < W; x += step) {
      arr[x] = (arr[x - half] + arr[x + half < W ? x + half : W-1]) / 2
               + (Math.random() * 2 - 1) * scale;
    }
    scale *= 0.55;
    step = half;
  }
  for (let x = 0; x < W; x++) {
    terrain[x] = Math.max(H * 0.15, Math.min(H * 0.85, arr[x]));
  }
  // smooth
  for (let s = 0; s < 4; s++) {
    for (let x = 1; x < W-1; x++) {
      terrain[x] = (terrain[x-1] + terrain[x] + terrain[x+1]) / 3;
    }
  }
}

function placeTanks() {
  const xs = [];
  const spacing = W / (NUM_PLAYERS + 1);
  for (let i = 0; i < NUM_PLAYERS; i++) {
    const bx = Math.round(spacing * (i + 1));
    const rx = Math.max(20, Math.min(W-20, bx + Math.round((Math.random()-0.5)*spacing*0.4)));
    xs.push(rx);
  }
  // flatten terrain under tanks
  for (let i = 0; i < NUM_PLAYERS; i++) {
    const cx = xs[i];
    const ty = terrain[cx];
    for (let dx = -10; dx <= 10; dx++) {
      if (cx+dx >= 0 && cx+dx < W) terrain[cx+dx] = ty;
    }
    players[i].x = cx;
    players[i].y = ty;
  }
}

// ─── Drawing ─────────────────────────────────────────────────────────────────
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#000820');
  grad.addColorStop(1, '#001440');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // stars
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 80; i++) {
    const sx = (i * 97 + 13) % W;
    const sy = (i * 137 + 7) % (H * 0.6);
    ctx.fillRect(sx, sy, 1, 1);
  }
}

function drawTerrain() {
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x < W; x++) ctx.lineTo(x, terrain[x]);
  ctx.lineTo(W, H);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, H*0.3, 0, H);
  grad.addColorStop(0, '#3a2a10');
  grad.addColorStop(0.4, '#5a3a18');
  grad.addColorStop(1, '#2a1a08');
  ctx.fillStyle = grad;
  ctx.fill();
  // grass line
  ctx.strokeStyle = '#3d7a2a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, terrain[0]);
  for (let x = 1; x < W; x++) ctx.lineTo(x, terrain[x]);
  ctx.stroke();
}

function drawTank(p) {
  if (!p.alive) return;
  const x = p.x, y = p.y;
  // body
  ctx.fillStyle = p.color;
  ctx.fillRect(x - TANK_W/2, y - TANK_H, TANK_W, TANK_H);
  // turret dome
  ctx.beginPath();
  ctx.arc(x, y - TANK_H, 5, Math.PI, 0);
  ctx.fillStyle = p.color;
  ctx.fill();
  // wheels (decorative)
  ctx.fillStyle = '#333';
  for (let i = -6; i <= 6; i += 4) {
    ctx.beginPath();
    ctx.arc(x + i, y, 3, 0, Math.PI*2);
    ctx.fill();
  }
  // barrel
  const rad = (p.angle * Math.PI) / 180;
  const bx = x + Math.cos(Math.PI - rad) * BARREL_LEN;
  const by = (y - TANK_H) - Math.sin(rad) * BARREL_LEN;
  ctx.strokeStyle = p.color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y - TANK_H);
  ctx.lineTo(bx, by);
  ctx.stroke();
  // player label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, x, y - TANK_H - 8);
  // hp bar
  const barW = 30, barH = 4;
  ctx.fillStyle = '#300';
  ctx.fillRect(x - barW/2, y - TANK_H - 19, barW, barH);
  ctx.fillStyle = p.hp > 50 ? '#0f0' : p.hp > 25 ? '#ff0' : '#f00';
  ctx.fillRect(x - barW/2, y - TANK_H - 19, barW * p.hp / 100, barH);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(x - barW/2, y - TANK_H - 19, barW, barH);
}

function drawExplosions() {
  for (const ex of explosions) {
    const alpha = ex.life / ex.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    const grad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.radius * ex.phase);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.2, '#ff8');
    grad.addColorStop(0.5, ex.color || '#f80');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.radius * ex.phase, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    // trail
    if (p.trail && p.trail.length > 1) {
      ctx.strokeStyle = p.trailColor || '#fa0';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (const pt of p.trail) ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = p.color || '#ff0';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawTerrain();
  drawExplosions();
  for (const p of players) drawTank(p);
  drawProjectiles();
}

// ─── Physics ─────────────────────────────────────────────────────────────────
function getTerrainY(x) {
  const xi = Math.round(x);
  if (xi < 0 || xi >= W) return H;
  return terrain[xi];
}

function blastCrater(cx, cy, radius) {
  for (let x = Math.max(0, cx - radius); x < Math.min(W, cx + radius); x++) {
    const dx = x - cx;
    const depth = Math.sqrt(Math.max(0, radius*radius - dx*dx));
    terrain[x] = Math.max(terrain[x], cy + depth);
    terrain[x] = Math.min(terrain[x], H - 2);
  }
  // settle tanks
  for (const p of players) {
    if (p.alive) {
      p.y = getTerrainY(p.x);
    }
  }
}

function dirtUp(cx, cy, radius) {
  for (let x = Math.max(0, cx - radius); x < Math.min(W, cx + radius); x++) {
    const dx = x - cx;
    const depth = Math.sqrt(Math.max(0, radius*radius - dx*dx)) * 0.6;
    terrain[x] = Math.min(terrain[x], cy - depth);
    terrain[x] = Math.max(terrain[x], 5);
  }
  for (const p of players) {
    if (p.alive) p.y = getTerrainY(p.x);
  }
}

function explodeAt(cx, cy, wep, ownerId) {
  if (wep.dirt) {
    dirtUp(cx, cy, wep.radius);
  } else {
    blastCrater(cx, cy, wep.radius);
  }
  explosions.push({ x:cx, y:cy, radius:wep.radius, color:wep.color, life:45, maxLife:45, phase:0 });

  if (wep.napalm) {
    // spread fire
    for (let i = 0; i < 8; i++) {
      const angle = (Math.random() * Math.PI);
      const spd = 60 + Math.random()*80;
      projectiles.push({
        x:cx, y:cy,
        vx: Math.cos(angle) * spd,
        vy: -Math.abs(Math.sin(angle)) * spd * 0.5 - 30,
        weapon: { ...wep, radius: wep.radius*0.4, damage: wep.damage*0.5, napalm:false },
        ownerId, color:'#f80', trailColor:'#f40',
        trail:[], life:120,
      });
    }
    return;
  }

  if (!wep.dirt) {
    for (const p of players) {
      if (!p.alive) continue;
      const dist = Math.hypot(p.x - cx, p.y - cy);
      if (dist < wep.radius * 1.2) {
        const dmg = Math.round(wep.damage * (1 - dist / (wep.radius * 1.5)));
        if (dmg > 0) {
          p.hp = Math.max(0, p.hp - dmg);
          if (p.id !== ownerId) {
            players[ownerId].cash += dmg * 3;
            players[ownerId].score += dmg;
          }
          if (p.hp <= 0 && p.alive) {
            p.alive = false;
            explosions.push({ x:p.x, y:p.y, radius:40, color:'#f00', life:80, maxLife:80, phase:0 });
            if (p.id !== ownerId) {
              players[ownerId].cash += 500;
              players[ownerId].score += 200;
            }
          }
        }
      }
    }
  }
}

// ─── Fire ─────────────────────────────────────────────────────────────────────
function fire() {
  if (animating || !gameRunning) return;
  const p = players[currentPlayer];
  if (!p.alive) { nextTurn(); return; }
  const wep = WEAPONS[p.weapon];
  if (p.inventory[p.weapon] <= 0) { showMsg('OUT OF AMMO', 'Choose a different weapon!', false); return; }
  p.inventory[p.weapon]--;

  animating = true;
  document.getElementById('fire-btn').disabled = true;

  const rad = (p.angle * Math.PI) / 180;
  const speed = p.power * 4;
  const vx0 = Math.cos(Math.PI - rad) * speed;
  const vy0 = -Math.sin(rad) * speed;

  const shots = [];
  const n = wep.projectiles;
  for (let i = 0; i < n; i++) {
    const spreadAngle = n > 1 ? (i - (n-1)/2) * wep.spread : 0;
    shots.push({
      x: p.x, y: p.y - TANK_H,
      vx: vx0 + Math.sin(spreadAngle) * speed,
      vy: vy0 + (n > 1 ? Math.random()*(-30) : 0),
      weapon: wep,
      ownerId: p.id,
      color: wep.color, trailColor: wep.trail,
      trail: [], life: 600,
      roller: wep.roller || false,
    });
  }
  projectiles.push(...shots);
}

// ─── Animation loop ───────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // update explosions
  for (let i = explosions.length-1; i >= 0; i--) {
    const ex = explosions[i];
    ex.life--;
    ex.phase = 0.3 + (1 - ex.life / ex.maxLife) * 0.8;
    if (ex.life <= 0) explosions.splice(i, 1);
  }

  // update projectiles
  for (let i = projectiles.length-1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.trail.push({ x: proj.x, y: proj.y });
    if (proj.trail.length > 18) proj.trail.shift();

    proj.vx += wind * dt * 0.5;
    if (!proj.roller) {
      proj.vy += GRAVITY * dt;
    }
    proj.x += proj.vx * dt;
    proj.y += proj.vy * dt;
    proj.life--;

    const ty = getTerrainY(proj.x);

    if (proj.roller) {
      // roll along ground
      if (proj.y >= ty) {
        proj.y = ty;
        proj.vy = 0;
        proj.vx *= 0.98;
        if (Math.abs(proj.vx) < 5) {
          explodeAt(proj.x, proj.y, proj.weapon, proj.ownerId);
          projectiles.splice(i, 1);
          continue;
        }
      }
    }

    if (proj.x < 0 || proj.x > W || proj.y > H || proj.life <= 0) {
      if (proj.y > H * 0.05) {
        explodeAt(proj.x, Math.min(proj.y, ty), proj.weapon, proj.ownerId);
      }
      projectiles.splice(i, 1);
      continue;
    }

    if (!proj.roller && proj.y >= ty) {
      explodeAt(proj.x, ty, proj.weapon, proj.ownerId);
      projectiles.splice(i, 1);
      continue;
    }
  }

  render();

  if (projectiles.length === 0 && explosions.length === 0 && animating) {
    animating = false;
    document.getElementById('fire-btn').disabled = false;
    checkWin();
    if (gameRunning) nextTurn();
  }

  requestAnimationFrame(loop);
}

// ─── Turn management ──────────────────────────────────────────────────────────
function nextTurn() {
  let tries = 0;
  do {
    currentPlayer = (currentPlayer + 1) % NUM_PLAYERS;
    tries++;
    if (tries > NUM_PLAYERS) break;
  } while (!players[currentPlayer].alive);

  if (currentPlayer === 0) {
    round++;
    document.getElementById('round-val').textContent = round;
    if (round > roundsTotal) { endGame(); return; }
    wind = (Math.random() * 2 - 1) * 60;
    updateWindHUD();
  }
  updateHUD();
  updateWeaponSelect();
}

function checkWin() {
  const alive = players.filter(p => p.alive);
  if (alive.length <= 1) {
    endGame(alive[0]);
  }
}

function endGame(winner) {
  gameRunning = false;
  if (winner) {
    showMsg(`${winner.name} WINS!`, `Score: ${winner.score} | Cash: $${winner.cash}`, true);
  } else {
    // find highest score
    const best = players.slice().sort((a,b) => b.score - a.score)[0];
    showMsg(`${best.name} WINS!`, `Score: ${best.score} | Cash: $${best.cash}`, true);
  }
}

function showMsg(title, body, newGame) {
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-body').textContent = body;
  document.getElementById('msg-btn').textContent = newGame ? 'NEW GAME' : 'OK';
  document.getElementById('msg-btn').onclick = newGame ? startNewGame : () => {
    document.getElementById('message').style.display = 'none';
  };
  document.getElementById('message').style.display = 'block';
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function updateHUD() {
  const p = players[currentPlayer];
  document.getElementById('turn-label').textContent = p.name.toUpperCase();
  document.getElementById('turn-label').style.color = p.color;
  document.getElementById('hp-val').textContent = p.hp;
  document.getElementById('cash-val').textContent = p.cash;
  document.getElementById('round-val').textContent = round;
  document.getElementById('angle-slider').value = p.angle;
  document.getElementById('angle-val').textContent = p.angle + '°';
  document.getElementById('power-slider').value = p.power;
  document.getElementById('power-val').textContent = p.power;

  // scores
  const sc = players.map(pl => `<span style="color:${pl.color}">${pl.name.split(' ')[1]}:${pl.score}</span>`).join(' ');
  document.getElementById('scores-hud').innerHTML = sc;
}

function updateWindHUD() {
  const w = Math.round(wind);
  document.getElementById('wind-val').textContent = Math.abs(w);
  document.getElementById('wind-arrow').textContent = w > 0 ? '→' : w < 0 ? '←' : '·';
}

function updateWeaponSelect() {
  const p = players[currentPlayer];
  const sel = document.getElementById('weapon-select');
  sel.innerHTML = '';
  WEAPONS.forEach((w, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${w.name} (${p.inventory[i]})`;
    if (p.inventory[i] <= 0) opt.disabled = true;
    sel.appendChild(opt);
  });
  sel.value = p.weapon;
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('angle-slider').addEventListener('input', e => {
  if (!gameRunning || animating) return;
  players[currentPlayer].angle = +e.target.value;
  document.getElementById('angle-val').textContent = e.target.value + '°';
});
document.getElementById('power-slider').addEventListener('input', e => {
  if (!gameRunning || animating) return;
  players[currentPlayer].power = +e.target.value;
  document.getElementById('power-val').textContent = e.target.value;
});
document.getElementById('weapon-select').addEventListener('change', e => {
  if (!gameRunning || animating) return;
  players[currentPlayer].weapon = +e.target.value;
});

document.addEventListener('keydown', e => {
  if (!gameRunning || animating) return;
  const p = players[currentPlayer];
  if (e.key === 'ArrowLeft' || e.key === 'a') { p.angle = Math.max(0, p.angle - 2); syncSliders(); }
  else if (e.key === 'ArrowRight' || e.key === 'd') { p.angle = Math.min(180, p.angle + 2); syncSliders(); }
  else if (e.key === '[') { p.power = Math.max(5, p.power - 2); syncSliders(); }
  else if (e.key === ']') { p.power = Math.min(100, p.power + 2); syncSliders(); }
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); fire(); }
});

function syncSliders() {
  const p = players[currentPlayer];
  document.getElementById('angle-slider').value = p.angle;
  document.getElementById('angle-val').textContent = p.angle + '°';
  document.getElementById('power-slider').value = p.power;
  document.getElementById('power-val').textContent = p.power;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function startNewGame() {
  document.getElementById('message').style.display = 'none';
  W = canvas.width  = canvas.parentElement.clientWidth;
  H = canvas.height = canvas.parentElement.clientHeight;
  players = Array.from({length: NUM_PLAYERS}, (_, i) => makePlayer(i));
  generateTerrain();
  placeTanks();
  currentPlayer = 0;
  round = 1;
  wind = (Math.random() * 2 - 1) * 40;
  projectiles = [];
  explosions = [];
  animating = false;
  gameRunning = true;
  updateHUD();
  updateWindHUD();
  updateWeaponSelect();
  document.getElementById('fire-btn').disabled = false;
}

window.addEventListener('resize', () => {
  if (!gameRunning) return;
  W = canvas.width  = canvas.parentElement.clientWidth;
  H = canvas.height = canvas.parentElement.clientHeight;
  generateTerrain();
  placeTanks();
  render();
});

window.onload = () => {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  startNewGame();
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
